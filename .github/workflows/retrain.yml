name: Retrain Model

on:
  workflow_dispatch:   

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run retraining pipeline
        run: python scripts/run_pipeline.py --target lung_cancer

      - name: Login to docker hub
        uses: docker/login-action@v3
        with: 
            username: ${{vars.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSSWORD}}
      - name: Build and push api image to docker hub
        working-directory: ./src/app
        run: |
            docker build -t ${{vars.DOCKER_USERNAME}}/model_api .
            docker push ${{vars.DOCKER_USERNAME}}/model_api
      - name: Build and push user interface
        working-directory: .frontend
        run: |
            docker build -t ${{vars.DOCKER_USERNAME}}/frontend
            docker push ${{vars.DOCKER_USERNAME}}/frontend
  cd:
      needs: retrain
      runs-on: ubuntu-latest

      steps:
         - name: Check out the code
           uses: actions/checkout@v4
         - name: Deploy to our server
           uses: appleboy/ssh-action@master
           with:
              host: ${{secrets.EC2_HOST_SERVER}}
              username: ${{secrets.EC2_USERNAME}}
              key: ${{secrets.EC2_PRIVATE_KEY}}
              script: |
                sudo apt upgrade & sudo apt update
                sudo mkdir app
                cd /home/ubuntu/app
                sudo docker-compose pull
                sudo docker-compose down
                sudo docker-compose up -d
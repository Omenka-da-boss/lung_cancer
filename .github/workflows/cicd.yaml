name: Lung Cancer Prediction Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows manual triggers

jobs:
  ci:
    name: Continuous Integration & Image Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Upgraded to v5
        with:
          python-version: "3.12"
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start MLflow & Train Model
        run: |
          mlflow server --host 0.0.0.0 --port 5000 &
          sleep 5 # Give MLflow time to boot
          python scripts/run_pipeline.py --input data/lung_cancer_dataset.csv --target lung_cancer

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSSWORD }} # Fixed typo from PASSSWORD

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/model_api:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/frontend:latest

  cd:
    name: Continuous Deployment
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Gets the files onto the GitHub Runner

      - name: Copy Config Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST_SERVER }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
            # Copy your config files and docker-compose to the server
          source: "docker-compose.yml,prometheus.yaml,alertmanager.yml,grafana/"
          target: "/home/ubuntu/lung_cancer/"
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_SERVER }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Ensure Docker Compose is available without reinstalling every time
            if ! command -v docker-compose &> /dev/null; then
              sudo apt update && sudo apt install docker-compose -y
            fi

            # Create project directory if it doesn't exist
            mkdir -p ~/lung_cancer
            cd ~/lung_cancer
            sudo tee .env <<EOF > /dev/null
            DOCKER_USERNAME=${{ vars.DOCKER_USERNAME }}
            REPO_TOKEN=${{secrets.REPO_TOKEN}}
            SLACK_WEBHOOK_URL=${{secrets.SLACK_WEBHOOK_URL}}
            ALERT_EMAIL_SENDER=${{secrets.ALERT_EMAIL_SENDER}}
            ALERT_EMAIL_RECIPIENTS=${{secrets.ALERT_EMAIL_RECIPIENTS}}
            ALERT_EMAIL_PASSWORD=${{secrets.ALERT_EMAIL_PASSWORD}}
            TWILIO_ACCOUNT_SID=${{secrets.TWILIO_ACCOUNT_SID}}
            TWILIO_AUTH_TOKEN=${{secrets.TWILIO_AUTH_TOKEN}} 
            TWILIO_WHATSAPP=${{secrets.TWILIO_WHATSAPP_FROM}}
            WHATSAPP_TO=${{secrets.WHATSAPP_TO}}
            USER_NAME=${{vars.USER_NAME}}  
            REPO_NAME=${{vars.REPO_NAME}}  
            SMTP_SERVER=${{vars.SMTP_SERVER}}
            SMTP_PORT=${{vars.SMTP_PORT}}
            EOF

            # Instead of git clone, we create a minimal docker-compose file 
            # or rely on the one already there. 
            # This pull command ensures we get the latest images we just built.
            sudo docker-compose pull
            sudo docker-compose up -d --remove-orphans
            sudo docker image prune -f 

  monitoring:
    name: Model Monitoring
    needs: cd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Drift Detection
        run: python data_drift/drift.py
        env:
          REPO_TOKEN : ${{secrets.REPO_TOKEN}}
          SLACK_WEBHOOK_URL : ${{secrets.SLACK_WEBHOOK_URL}}
          ALERT_EMAIL_SENDER : ${{secrets.ALERT_EMAIL_SENDER}}
          ALERT_EMAIL_RECIPIENTS : ${{secrets.ALERT_EMAIL_RECIPIENTS}}
          ALERT_EMAIL_PASSWORD : ${{secrets.ALERT_EMAIL_PASSWORD}}
          TWILIO_ACCOUNT_SID : ${{secrets.TWILIO_ACCOUNT_SID}}
          TWILIO_AUTH_TOKEN : ${{secrets.TWILIO_AUTH_TOKEN}} 
          TWILIO_WHATSAPP : ${{secrets.TWILIO_WHATSAPP_FROM}}
          WHATSAPP_TO : ${{secrets.WHATSAPP_TO}}
          USER_NAME : ${{vars.USER_NAME}}  
          REPO_NAME : ${{vars.REPO_NAME}}  
          SMTP_SERVER : ${{vars.SMTP_SERVER}}
          SMTP_PORT: ${{vars.SMTP_PORT}}
                
            




            



name: Lung Cancer Prediction Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allows manual trigger

jobs:
  ci:
    name: Continuous Integration & Image Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start MLflow & Train Model
        run: |
          mlflow server --host 0.0.0.0 --port 5000 &
          sleep 5
          python scripts/run_pipeline.py --input data/lung_cancer_dataset.csv --target lung_cancer

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}   # Fixed typo

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/model_api:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/frontend:latest

  cd:
    name: Continuous Deployment
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Config Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST_SERVER }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml,prometheus.yaml,alertmanager.yml,grafana/"
          target: "/home/ubuntu/lung_cancer/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST_SERVER }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Install Docker Compose if missing
            if ! command -v docker-compose &> /dev/null; then
              sudo apt update && sudo apt install docker-compose -y
            fi

            # Create project directory
            mkdir -p ~/lung_cancer
            cd ~/lung_cancer

            # Write environment variables from GitHub secrets/vars
            sudo tee .env <<EOF > /dev/null
            DOCKER_USERNAME=${{ vars.DOCKER_USERNAME }}
            REPO_TOKEN=${{ secrets.REPO_TOKEN }}
            SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
            ALERT_EMAIL_SENDER=${{ secrets.ALERT_EMAIL_SENDER }}
            ALERT_EMAIL_RECIPIENTS=${{ secrets.ALERT_EMAIL_RECIPIENTS }}
            ALERT_EMAIL_PASSWORD=${{ secrets.ALERT_EMAIL_PASSWORD }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_WHATSAPP=${{ secrets.TWILIO_WHATSAPP_FROM }}
            WHATSAPP_TO=${{ secrets.WHATSAPP_TO }}
            USER_NAME=${{ vars.USER_NAME }}
            REPO_NAME=${{ vars.REPO_NAME }}
            SMTP_SERVER=${{ vars.SMTP_SERVER }}
            SMTP_PORT=${{ vars.SMTP_PORT }}
            EOF

            # Pull latest images and restart services
            sudo docker-compose pull
            sudo docker-compose up -d --remove-orphans
            sudo docker image prune -f

  monitoring:
    name: Model Monitoring (Drift Detection)
    needs: cd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Drift Detection
        run: python data_drift/drift.py
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ALERT_EMAIL_SENDER: ${{ secrets.ALERT_EMAIL_SENDER }}
          ALERT_EMAIL_RECIPIENTS: ${{ secrets.ALERT_EMAIL_RECIPIENTS }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          USER_NAME: ${{ vars.USER_NAME }}
          REPO_NAME: ${{ vars.REPO_NAME }}
          SMTP_SERVER: ${{ vars.SMTP_SERVER }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}




            



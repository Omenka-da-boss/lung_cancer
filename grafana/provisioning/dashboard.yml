{
  "dashboard": {
    "title": "ML Model Production Monitoring",
    "tags": ["ml", "production"],
    "timezone": "browser",
    "panels": [
      {
        "title": "Request Rate & Error Rate",
        "type": "graph",
        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
        "targets": [
          {
            "expr": "rate(http_requests_total[5m])",
            "legendFormat": "Total Requests/s"
          },
          {
            "expr": "rate(http_errors_total[5m])",
            "legendFormat": "Errors/s",
            "hide": false
          }
        ]
      },
      {
        "title": "Error Percentage",
        "type": "stat",
        "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
        "targets": [{
          "expr": "sum(rate(http_errors_total[5m])) / sum(rate(http_requests_total[5m])) * 100",
          "format": "percent"
        }]
      },
      {
        "title": "Latency Percentiles",
        "type": "graph",
        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
        "targets": [
          {
            "expr": "histogram_quantile(0.5, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
            "legendFormat": "P50"
          },
          {
            "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
            "legendFormat": "P95"
          },
          {
            "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
            "legendFormat": "P99"
          }
        ]
      },
      {
        "title": "Input Distribution Heatmap",
        "type": "heatmap",
        "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
        "targets": [{
          "expr": "sum(rate(model_input_value_bucket[5m])) by (le)",
          "format": "heatmap"
        }]
      },
      {
        "title": "Prediction Distribution (Drift Detection)",
        "type": "graph",
        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
        "targets": [
          {
            "expr": "histogram_quantile(0.5, sum(rate(model_prediction_value_bucket[5m])) by (le))",
            "legendFormat": "Current P50"
          },
          {
            "expr": "histogram_quantile(0.5, sum(rate(model_prediction_value_bucket[5m] offset 1h)) by (le))",
            "legendFormat": "1 Hour Ago P50"
          }
        ]
      },
      {
        "title": "Model Confidence",
        "type": "graph",
        "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
        "targets": [{
          "expr": "model_confidence{prediction_type='current'}",
          "legendFormat": "Confidence"
        }]
      },
      {
        "title": "Drift Score",
        "type": "singlestat",
        "gridPos": {"h": 4, "w": 4, "x": 20, "y": 4},
        "targets": [{
          "expr": "abs(avg_over_time(model_prediction_value[5m]) - avg_over_time(model_prediction_value[1h] offset 1h)) / stddev_over_time(model_prediction_value[1h] offset 1h)",
          "format": "percent"
        }],
        "valueName": "current"
      }
    ]
  }
}


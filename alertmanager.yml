route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 10s          # Wait to group alerts
  group_interval: 10s      # Wait to send new alerts for same group
  repeat_interval: 12h     # Repeat notifications for firing alerts
  
  # Default route
  receiver: 'slack-notifications'
  
  # Routes based on severity
  routes:
    - match:
        severity: 'critical'
      receiver: 'slack-notifications'
      continue: true
    
    - match:
        severity: 'warning'
      receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/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'  # Replace with your webhook
        channel: '#ml-alerts'
        title: 'ML Model Alert'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          *Summary:* {{ .Annotations.summary }}
          *Graph:* <{{ .GeneratorURL }}|View in Prometheus>
        actions:
          - type: button
            text: 'View Dashboard'
            url: 'http://localhost:3000/d/ml-monitoring'


  - name: 'email-notifications'
    email_configs:
      - to: '${ALERT_EMAIL_RECIPIENTS}'
        from: '${ALERT_EMAIL_SENDER}'
        smarthost: 'smtp.gmail.com:465'
        auth_username: '${ALERT_EMAIL_RECIPIENTS}'
        auth_password: '${ALERT_EMAIL_PASSWORD}'

# Inhibition rules - prevent cascading alerts
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'instance']  # Don't send warnings if critical already firing
  
  - source_match:
      alertname: 'ModelDown'
    target_match_re:
      alertname: '.*Latency.*'
    equal: ['service']